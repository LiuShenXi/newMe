<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewMe 交互原型 · 静态 HTML</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #030606;
      color: #fff;
    }
    button, input, textarea {
      font: inherit;
      color: inherit;
    }
    button {
      border: 0;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
    }
    .app-shell {
      min-height: 100vh;
      padding: 32px 24px;
    }
    .prototype-stage {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    @media (min-width: 1024px) {
      .prototype-stage {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
      }
    }
    .device-zone {
      flex: 0 0 auto;
    }
    .device-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 8px;
      color: #cbd5e1;
      font-size: 14px;
    }
    .device-name {
      color: rgba(71, 85, 105, .85);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .phone-host {
      position: relative;
      width: 393px;
      height: 812px;
      max-width: calc(100vw - 32px);
    }
    .phone {
      position: relative;
      width: 393px;
      height: 812px;
      overflow: hidden;
      border-radius: 46px;
      border: 1px solid rgba(167, 243, 208, .10);
      background: #07110f;
      box-shadow: 0 30px 90px rgba(0, 0, 0, .55);
    }
    .phone-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 8%, rgba(37, 255, 219, .12), transparent 28%),
        radial-gradient(circle at 20% 90%, rgba(120, 255, 175, .10), transparent 35%),
        linear-gradient(180deg, #091411 0%, #060b0a 55%, #030605 100%);
    }
    .phone-grid {
      position: absolute;
      inset: 0;
      opacity: .15;
      background-image:
        linear-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .phone-content {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 16px 20px 20px;
      color: #f1f5f9;
    }
    .status-bar {
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(203, 213, 225, .70);
      font-size: 12px;
    }
    .speaker {
      width: 112px;
      height: 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .35);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, .32);
    }
    .phone-main {
      min-height: 0;
      flex: 1;
      padding-top: 12px;
    }
    .bottom-nav {
      height: 70px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      padding: 8px;
      border-radius: 26px;
      border: 1px solid rgba(209, 250, 229, .10);
      background: rgba(10, 22, 19, .85);
      box-shadow: 0 -10px 40px rgba(0, 0, 0, .30);
      backdrop-filter: blur(24px);
    }
    .nav-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-radius: 16px;
      background: transparent;
      color: #64748b;
      font-size: 11px;
      transition: transform .18s ease, color .18s ease, background .18s ease;
    }
    .nav-button:hover {
      background: rgba(255, 255, 255, .035);
      color: #cbd5e1;
    }
    .nav-button:active {
      transform: scale(.96);
    }
    .nav-button.active {
      color: #cffafe;
      background: rgba(165, 243, 252, .10);
      box-shadow: inset 0 0 24px rgba(65, 255, 226, .11);
    }
    .nav-button svg {
      width: 20px;
      height: 20px;
    }
    .screen-stack {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      padding-bottom: 8px;
    }
    .glass-card {
      border-radius: 26px;
      border: 1px solid rgba(167, 243, 208, .10);
      background: rgba(255, 255, 255, .045);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08), 0 20px 48px rgba(0, 0, 0, .22);
      backdrop-filter: blur(20px);
    }
    .muted {
      color: #94a3b8;
    }
    .panel-in {
      animation: panel .28s cubic-bezier(.2, .8, .2, 1) both;
    }
    .primary-button {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(207, 250, 254, .20);
      background: rgba(207, 250, 254, .10);
      color: #ecfeff;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 0 30px rgba(63, 255, 227, .12);
      transition: transform .18s ease, opacity .18s ease;
    }
    .primary-button:active {
      transform: scale(.98);
    }
    .primary-button:disabled {
      opacity: .40;
      box-shadow: none;
    }
    .ghost-button {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .04);
      color: #cbd5e1;
    }
    .small-pill {
      border-radius: 999px;
      border: 1px solid rgba(207, 250, 254, .15);
      background: rgba(207, 250, 254, .08);
      padding: 8px 12px;
      color: #cffafe;
      font-size: 12px;
      transition: transform .18s ease;
    }
    .small-pill:active {
      transform: scale(.96);
    }
    .onboarding-step {
      height: 100%;
      padding-top: 16px;
    }
    .onboarding-card {
      padding: 24px;
      text-align: center;
      border-radius: 34px;
      border: 1px solid rgba(167, 243, 208, .10);
      background: radial-gradient(circle at 50% 28%, rgba(123, 255, 194, .18), transparent 44%), rgba(255, 255, 255, .035);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08);
    }
    .intro-tree {
      position: relative;
      width: 240px;
      height: 320px;
      margin: 0 auto;
    }
    .intro-trunk {
      position: absolute;
      bottom: 20px;
      left: 50%;
      width: 16px;
      height: 160px;
      transform: translateX(-50%);
      border-radius: 999px 999px 0 0;
      background: #51351d;
    }
    .intro-leaf {
      position: absolute;
      border-radius: 999px;
      background: radial-gradient(circle at 38% 30%, rgba(152, 255, 197, .72), rgba(30, 86, 62, .74));
    }
    .intro-leaf.one {
      bottom: 160px;
      left: 92px;
      width: 96px;
      height: 96px;
      box-shadow: 0 0 45px rgba(97, 255, 184, .22);
    }
    .intro-leaf.two {
      bottom: 104px;
      left: 58px;
      width: 112px;
      height: 112px;
    }
    .intro-leaf.three {
      bottom: 88px;
      right: 42px;
      width: 112px;
      height: 112px;
    }
    .intro-shadow {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 176px;
      height: 20px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(167, 243, 208, .30);
      filter: blur(18px);
    }
    .onboarding-copy {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
    }
    .onboarding-form {
      padding-top: 40px;
    }
    .question {
      margin: 0;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.55;
    }
    .goal-input {
      width: 100%;
      height: 160px;
      margin-top: 20px;
      resize: none;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, .08);
      outline: none;
      background: rgba(0, 0, 0, .25);
      padding: 16px;
      color: #f8fafc;
      font-size: 14px;
      line-height: 1.7;
    }
    .goal-input:focus {
      border-color: rgba(207, 250, 254, .30);
    }
    .goal-input::placeholder {
      color: #64748b;
    }
    .hint-copy {
      margin: 12px 0 0;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.7;
    }
    .loading-track {
      height: 6px;
      margin-top: 20px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .10);
    }
    .loading-bar {
      width: 66%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #70ffbe, #55ffe0, #e9d58a);
      animation: loadingBar 1.05s ease-in-out infinite;
    }
    .focus-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .focus-card {
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .06);
      background: rgba(0, 0, 0, .18);
    }
    .focus-card p {
      margin: 0;
    }
    .focus-title {
      color: #f1f5f9;
      font-size: 14px;
    }
    .focus-note {
      margin-top: 4px !important;
      color: #94a3b8;
      font-size: 12px;
    }
    .energy-orb {
      position: relative;
      display: grid;
      place-items: center;
      width: 242px;
      height: 242px;
      margin: 0 auto;
    }
    .orb-aura {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(165, 243, 252, .10);
      filter: blur(40px);
    }
    .orb-core {
      position: absolute;
      width: 224px;
      height: 224px;
      border-radius: 50%;
      border: 1px solid rgba(207, 250, 254, .45);
      background: radial-gradient(circle at 45% 38%, rgba(121, 255, 234, .22), rgba(15, 32, 38, .70) 50%, rgba(5, 12, 13, .95) 72%);
      box-shadow: 0 0 42px rgba(77, 255, 230, .28), inset 0 -28px 42px rgba(95, 255, 215, .22), inset 0 18px 60px rgba(255, 255, 255, .07);
    }
    .orb-shadow {
      position: absolute;
      bottom: 8px;
      width: 160px;
      height: 32px;
      border-radius: 999px;
      background: rgba(165, 243, 252, .40);
      filter: blur(20px);
    }
    .orb-bubble {
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(207, 250, 254, .40);
      background: rgba(165, 243, 252, .10);
      box-shadow: inset 0 -8px 18px rgba(74, 255, 224, .24), 0 0 20px rgba(74, 255, 224, .25);
    }
    .is-charging .orb-aura {
      animation: orbAura 1.25s ease-in-out both;
    }
    .is-charging .orb-core {
      animation: orbCharge 1.25s ease-in-out both;
    }
    .is-charging .orb-bubble {
      animation: bubbleRise 1.25s ease-in-out both;
    }
    .orb-text {
      position: relative;
      text-align: center;
    }
    .orb-value {
      color: #fff;
      font-size: 58px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: 0;
    }
    .orb-value span {
      color: rgba(207, 250, 254, .90);
      font-size: 24px;
    }
    .orb-label {
      margin-top: 12px;
      color: rgba(253, 230, 138, .90);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0;
    }
    .orb-status {
      width: fit-content;
      margin: 12px auto 0;
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid rgba(207, 250, 254, .20);
      color: rgba(236, 254, 255, .70);
      font-size: 12px;
      transition: border .2s ease, background .2s ease, color .2s ease;
    }
    .is-charging .orb-status {
      border-color: rgba(254, 243, 199, .40);
      background: rgba(254, 243, 199, .10);
      color: #fffbeb;
    }
    .energy-progress {
      flex: 0 0 auto;
      padding: 16px;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card-head h3 {
      margin: 0;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }
    .card-head .badge {
      border-radius: 999px;
      background: rgba(167, 243, 208, .10);
      padding: 4px 12px;
      color: rgba(209, 250, 229, .70);
      font-size: 11px;
    }
    .progress-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .progress-meta span:first-child {
      overflow: hidden;
      color: #e2e8f0;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .progress-meta span:last-child {
      color: #cffafe;
    }
    .progress-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(241, 245, 249, .10);
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(112, 255, 190, .75), rgba(75, 229, 255, .95));
      transition: width .3s ease;
    }
    .range-card {
      flex: 0 0 auto;
      padding: 16px;
    }
    .range-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .range-head span:first-child {
      color: #fff;
    }
    .range-head span:last-child {
      color: #fde68a;
    }
    .energy-range {
      width: 100%;
      height: 24px;
      margin: 0;
      appearance: none;
      background: transparent;
      --range-fill: 82%;
    }
    .energy-range::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(103, 232, 249, .95) 0%, rgba(103, 232, 249, .95) var(--range-fill), rgba(255, 255, 255, .12) var(--range-fill), rgba(255, 255, 255, .12) 100%);
    }
    .energy-range::-webkit-slider-thumb {
      width: 24px;
      height: 24px;
      margin-top: -9px;
      appearance: none;
      border-radius: 999px;
      border: 3px solid #ecfeff;
      background: #67e8f9;
      box-shadow: 0 0 22px rgba(103, 232, 249, .35);
    }
    .energy-range::-moz-range-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .12);
    }
    .energy-range::-moz-range-progress {
      height: 6px;
      border-radius: 999px;
      background: rgba(103, 232, 249, .95);
    }
    .energy-range::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 3px solid #ecfeff;
      background: #67e8f9;
      box-shadow: 0 0 22px rgba(103, 232, 249, .35);
    }
    .confirm-energy {
      flex: 0 0 auto;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid rgba(207, 250, 254, .20);
      background: rgba(207, 250, 254, .10);
      color: #ecfeff;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 0 30px rgba(63, 255, 227, .12);
      transition: transform .18s ease;
    }
    .confirm-energy:active {
      transform: scale(.98);
    }
    .toast {
      position: absolute;
      z-index: 60;
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%);
      border-radius: 999px;
      border: 1px solid rgba(207, 250, 254, .20);
      background: rgba(0, 0, 0, .55);
      padding: 8px 16px;
      color: #ecfeff;
      font-size: 12px;
      white-space: nowrap;
      backdrop-filter: blur(20px);
      animation: panel .28s cubic-bezier(.2, .8, .2, 1) both;
    }
    .chip-row {
      display: flex;
      gap: 8px;
      overflow: hidden;
      padding-top: 4px;
    }
    .chip {
      flex: 0 0 auto;
      border-radius: 999px;
      border: 1px solid rgba(167, 243, 208, .10);
      background: rgba(167, 243, 208, .08);
      padding: 8px 12px;
      color: rgba(236, 253, 245, .75);
      font-size: 12px;
    }
    .list-card {
      min-height: 0;
      flex: 1;
      padding: 16px;
    }
    .list-title {
      margin: 0;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }
    .list-subtitle {
      margin: 4px 0 0;
      color: #94a3b8;
      font-size: 12px;
    }
    .todo-scroll {
      max-height: 338px;
      margin-top: 20px;
      padding-right: 4px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .todo-button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .06);
      background: rgba(0, 0, 0, .18);
      padding: 12px;
      text-align: left;
      transition: border .18s ease, transform .18s ease;
    }
    .todo-button:hover {
      border-color: rgba(207, 250, 254, .20);
    }
    .todo-button:active {
      transform: scale(.99);
    }
    .todo-mark {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid rgba(100, 116, 139, .50);
      color: #64748b;
      font-size: 12px;
    }
    .todo-mark.done {
      border-color: rgba(207, 250, 254, .40);
      background: rgba(207, 250, 254, .20);
      color: #ecfeff;
    }
    .todo-text {
      color: #f1f5f9;
      font-size: 14px;
    }
    .todo-text.done {
      color: #94a3b8;
      text-decoration: line-through;
      text-decoration-color: rgba(207, 250, 254, .40);
    }
    .add-panel {
      margin-top: 16px;
      border-radius: 16px;
      border: 1px solid rgba(207, 250, 254, .15);
      background: rgba(0, 0, 0, .20);
      padding: 12px;
    }
    .draft-input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      font-size: 14px;
    }
    .draft-input::placeholder {
      color: #64748b;
    }
    .add-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .add-actions button {
      flex: 1;
      border-radius: 12px;
      padding: 8px;
      font-size: 12px;
    }
    .add-actions button:first-child {
      background: rgba(207, 250, 254, .12);
      color: #ecfeff;
    }
    .add-actions button:last-child {
      background: rgba(255, 255, 255, .04);
      color: #cbd5e1;
    }
    .add-trigger {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(167, 243, 208, .10);
      background: rgba(255, 255, 255, .04);
      color: rgba(236, 253, 245, .80);
      font-size: 14px;
      transition: transform .18s ease;
    }
    .add-trigger:active {
      transform: scale(.98);
    }
    .week-strip {
      flex: 0 0 auto;
      padding: 16px;
    }
    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .day-cell {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .06);
      background: rgba(255, 255, 255, .035);
      padding: 8px 6px;
      text-align: center;
      opacity: .70;
    }
    .day-cell.today {
      border-color: rgba(207, 250, 254, .35);
      background: rgba(207, 250, 254, .10);
      opacity: 1;
    }
    .day-cell p {
      margin: 0;
      color: #cbd5e1;
      font-size: 12px;
    }
    .day-cell p + p {
      margin-top: 4px;
      color: #fff;
    }
    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(0, 0, 0, .22);
      padding: 6px;
    }
    .seg-button {
      border-radius: 17px;
      background: transparent;
      padding: 10px 8px;
      color: #64748b;
      font-size: 14px;
      transition: transform .18s ease, background .18s ease, color .18s ease;
    }
    .seg-button.active {
      background: rgba(207, 250, 254, .12);
      color: #ecfeff;
      box-shadow: 0 0 24px rgba(77, 255, 230, .12);
    }
    .seg-button:active {
      transform: scale(.98);
    }
    .scroll-area {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      padding-top: 20px;
      padding-right: 4px;
    }
    .plan-intro {
      margin-bottom: 20px;
      padding: 16px;
    }
    .eyebrow {
      margin: 0;
      color: rgba(209, 250, 229, .50);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .plan-intro h3,
    .tree-detail h3 {
      margin: 8px 0 0;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .plan-intro-grid {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .replan-button {
      flex: 0 0 auto;
      border-radius: 999px;
      background: rgba(254, 240, 138, .10);
      padding: 8px 12px;
      color: #fef3c7;
      font-size: 12px;
      transition: transform .18s ease;
    }

      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",

      energyValue: 82,

      viewedList: false,
      showReminder: false,
      showWeek: false,
      selectedFruit: null,

    function icon(type) {
      const paths = {
        energy: '<path d="M13 2 5 14h6l-1 8 9-13h-6l0-7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />',
        list: '<path d="M8 6h12M8 12h12M8 18h12M4 6h.01M4 12h.01M4 18h.01" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />',
        plan: '<path d="M7 3v18M7 6h9l-2 3 2 3H7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />',
        tree: '<path d="M12 21v-8M12 13c-4.2 0-6-2.2-6-5.5C9 7.5 11 9 12 13Zm0 0c4.2 0 6-2.2 6-5.5-3 0-5 1.5-6 5.5ZM12 21c3.5-1.6 6-4.4 6-8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />',
      };
      return `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">${paths[type] || paths.tree}</svg>`;
    }

    function weekEnergy() {
      const values = state.weekRecords.map((day) => day.v).filter(Boolean);
      if (!values.length) return 0;
      return Math.round(values.reduce((sum, value) => sum + value, 0) / values.length);

    }

    function renderPhone(children, options = {}) {

    function renderEnergyOrb() {
      const bubbles = Array.from({ length: 7 }, (_, index) => {
        const size = 16 + index * 5;
        const left = 42 + (index % 4) * 40;
        const bottom = 12 + (index % 5) * 20;
        const opacity = 0.42 - index * 0.026;
        return `<span class="orb-bubble" style="width:${size}px;height:${size}px;left:${left}px;bottom:${bottom}px;opacity:${opacity};animation-delay:${index * 90}ms"></span>`;
      }).join("");
      return `
        <div class="energy-orb ${state.charging ? "is-charging" : ""}">
          <div class="orb-aura"></div>
          <div class="orb-core"></div>
          <div class="orb-shadow"></div>

    function renderPlanScreen() {
      const monthContent = `

      const yearContent = `
        <div class="scroll-area panel-in">

        </div>`;

      return renderPhone(`<div style="height:100%;padding-bottom:8px">${state.treeDetail ? renderTreeDetail() : renderTreeCanvas()}</div>`, { tab: "tree" });
    }

      return `

          <div class="modal-card">
            <p class="eyebrow" style="color:rgba(254,243,199,.60)">time capsule</p>

      return `

    function renderApp() {
      const screen = !state.booted
        ? renderPhone(renderOnboarding(), { tab: "tree", showNav: false })
        : state.tab === "energy"
          ? renderEnergyScreen()
          : state.tab === "list"
            ? renderListScreen()
            : state.tab === "plan"
              ? renderPlanScreen()
              : state.tab === "tree"
                ? renderTreeScreen()
                : renderSettlementScreen();
      document.getElementById("phoneHost").innerHTML = screen + renderOverlays();
      document.getElementById("sidePanel").innerHTML = renderSidePanel();
      const draft = document.getElementById("draft-input");
      if (draft) draft.focus();

    function changeTab(tab) {
      if (tab === "list") state.viewedList = true;
      if (tab === "settlement") state.settlementConfirmed = false;
      state.tab = tab;
      state.showReminder = false;
      state.showWeek = false;
      state.selectedFruit = null;
      renderApp();
    }

    function doConfirmEnergy() {
      const doneCount = state.todos.filter((todo) => todo.done).length;
      state.charging = true;
      state.weekRecords = state.weekRecords.map((day, index) => index === 6 ? { ...day, v: state.energyValue, tasks: `${doneCount}/${state.todos.length}` } : day);
      state.toast = true;
      renderApp();
      window.setTimeout(() => {
        state.charging = false;
        renderApp();
      }, 1300);
      window.setTimeout(() => {
        state.toast = false;
        renderApp();
      }, 1400);
    }

    function resetPrototype() {
      state.booted = false;
      state.tab = "energy";
      state.onboardingStep = 0;
      state.onboardingLoading = false;
      state.todos = cloneTodos();
      state.monthWeeks = cloneMonth();
      state.weekRecords = cloneWeek();
      state.energyValue = 82;
      state.charging = false;
      state.viewedList = false;
      state.showReminder = false;
      state.showWeek = false;
      state.selectedFruit = null;
      state.selectedWeek = null;
      state.adding = false;
      state.draft = "";
      state.planView = "month";
      state.planning = false;
      state.treeDetail = null;
      state.settlementConfirmed = false;
      state.toast = false;
      renderApp();
    }

    document.addEventListener("click", (event) => {
      if (event.target.classList.contains("modal-layer")) {
        const modal = event.target.dataset.modal;
        if (modal === "reminder") state.showReminder = false;
        if (modal === "week") state.showWeek = false;
        if (modal === "fruit") state.selectedFruit = null;
        renderApp();
        return;
      }
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;
      if (action === "onboard-next") {
        state.onboardingStep = 1;
      }
      if (action === "start-ai") {
        if (!state.goal.trim() || state.onboardingLoading) return;
        state.onboardingLoading = true;
        renderApp();
        window.setTimeout(() => {
          state.onboardingLoading = false;
          state.onboardingStep = 2;
          renderApp();
        }, 1000);
        return;
      }
      if (action === "finish-onboarding" || action === "skip-onboarding") {
        state.booted = true;
        state.tab = "energy";
      }
      if (action === "change-tab") {
        if (!state.booted) return;
        changeTab(target.dataset.tab);
        return;
      }
      if (action === "confirm-energy") {
        if (!state.viewedList) {
          state.showReminder = true;
        } else {
          doConfirmEnergy();
          return;
        }
      }
      if (action === "reminder-list") {
        state.showReminder = false;
        changeTab("list");
        return;
      }
      if (action === "reminder-continue") {
        state.showReminder = false;
        doConfirmEnergy();
        return;
      }
      if (action === "toggle-todo") {
        const id = Number(target.dataset.id);
        state.todos = state.todos.map((todo) => todo.id === id ? { ...todo, done: !todo.done } : todo);
      }
      if (action === "open-add") {
        state.adding = true;
        state.draft = "";
      }
      if (action === "cancel-add") {
        state.adding = false;
        state.draft = "";
      }
      if (action === "add-todo") {
        const value = state.draft.trim();
        if (value) {
          state.todos = [...state.todos, { id: Date.now(), text: value, done: false }];
          state.draft = "";
          state.adding = false;
        }
      }
      if (action === "open-week") {
        state.showWeek = true;
      }
      if (action === "close-week") {
        state.showWeek = false;
      }
      if (action === "plan-view") {
        state.planView = target.dataset.view;
      }
      if (action === "replan") {
        state.planning = true;
        renderApp();
        window.setTimeout(() => {
          state.monthWeeks = state.monthWeeks.map((item) => item.week === "W17"
            ? { ...item, title: "根据本周结果重排 AI 任务", items: ["调整任务密度", "保留晨跑", "压缩阅读量"] }
            : item);
          state.planning = false;
          renderApp();
        }, 1000);
        return;
      }
      if (action === "select-week") {
        state.selectedWeek = target.dataset.week;
        state.viewedList = true;
        changeTab("list");
        return;
      }
      if (action === "tree-detail") {
        state.treeDetail = target.dataset.type;
      }
      if (action === "tree-back") {
        state.treeDetail = null;
      }
      if (action === "open-fruit") {
        state.selectedFruit = FRUITS[Number(target.dataset.index)];
      }
      if (action === "close-fruit") {
        state.selectedFruit = null;
      }
      if (action === "settle-confirm") {
        state.settlementConfirmed = true;
        renderApp();
        window.setTimeout(() => {
          state.tab = "tree";
          state.settlementConfirmed = false;
          renderApp();
        }, 900);
        return;
      }
      if (action === "reset") {
        resetPrototype();
        return;
      }
      renderApp();
    });

    document.addEventListener("input", (event) => {
      if (event.target.id === "goal-input") {
        state.goal = event.target.value;
        const button = document.querySelector('[data-action="start-ai"]');
        if (button) button.disabled = !state.goal.trim() || state.onboardingLoading;
      }
      if (event.target.id === "draft-input") {
        state.draft = event.target.value;
      }
      if (event.target.id === "energy-range") {
        state.energyValue = Number(event.target.value);
        event.target.style.setProperty("--range-fill", `${state.energyValue}%`);
        const label = document.getElementById("energy-value-label");
        if (label) label.textContent = `${state.energyValue}%`;
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.target.id === "draft-input" && event.key === "Enter") {
        event.preventDefault();
        const value = state.draft.trim();
        if (!value) return;
        state.todos = [...state.todos, { id: Date.now(), text: value, done: false }];
        state.draft = "";
        state.adding = false;
        renderApp();
      }
    });

    renderApp();
  </script>
</body>
</html>
