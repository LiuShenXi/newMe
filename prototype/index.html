<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewMe 交互原型 · 静态 HTML</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #030606;
      color: #fff;
    }
    button, input, textarea {
      font: inherit;
      color: inherit;
    }
    button {
      border: 0;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
    }
    .app-shell {
      min-height: 100vh;
      padding: 32px 24px;
    }
    .prototype-stage {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    @media (min-width: 1024px) {
      .prototype-stage {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
      }
    }
    .device-zone {
      flex: 0 0 auto;
    }
    .device-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 8px;
      color: #cbd5e1;
      font-size: 14px;
    }
    .device-name {
      color: rgba(71, 85, 105, .85);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .phone-host {
      position: relative;
      width: 393px;
      height: 812px;
      max-width: calc(100vw - 32px);
    }
    .phone {
      position: relative;
      width: 393px;
      height: 812px;
      overflow: hidden;
      border-radius: 46px;
      border: 1px solid rgba(167, 243, 208, .10);
      background: #07110f;
      box-shadow: 0 30px 90px rgba(0, 0, 0, .55);
    }
    .phone-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 8%, rgba(37, 255, 219, .12), transparent 28%),
        radial-gradient(circle at 20% 90%, rgba(120, 255, 175, .10), transparent 35%),
        linear-gradient(180deg, #091411 0%, #060b0a 55%, #030605 100%);
    }
    .phone-grid {
      position: absolute;
      inset: 0;
      opacity: .15;
      background-image:
        linear-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .phone-content {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 16px 20px 20px;
      color: #f1f5f9;
    }
    .phone-main {
      min-height: 0;
      flex: 1;
      padding-top: 0;
    }
    .bottom-nav {
      height: 70px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      padding: 8px;
      border-radius: 26px;
      border: 1px solid rgba(209, 250, 229, .10);
      background: rgba(10, 22, 19, .85);
      box-shadow: 0 -10px 40px rgba(0, 0, 0, .30);
      backdrop-filter: blur(24px);
    }
    .nav-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-radius: 16px;
      background: transparent;
      color: #64748b;
      font-size: 11px;
      transition: transform .18s ease, color .18s ease, background .18s ease;
    }
    .nav-button:hover {
      background: rgba(255, 255, 255, .035);
      color: #cbd5e1;
    }
    .nav-button:active {
      transform: scale(.96);
    }
    .nav-button.active {
      color: #cffafe;
      background: rgba(165, 243, 252, .10);
      box-shadow: inset 0 0 24px rgba(65, 255, 226, .11);
    }
    .nav-button svg {
      width: 20px;
      height: 20px;
    }
    .screen-stack {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      padding-bottom: 8px;
    }
    .glass-card {
      border-radius: 26px;
      border: 1px solid rgba(167, 243, 208, .10);
      background: rgba(255, 255, 255, .045);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08), 0 20px 48px rgba(0, 0, 0, .22);
      backdrop-filter: blur(20px);
    }
    .muted {
      color: #94a3b8;
    }
    .panel-in {
      animation: panel .28s cubic-bezier(.2, .8, .2, 1) both;
    }
    .primary-button {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(207, 250, 254, .20);
      background: rgba(207, 250, 254, .10);
      color: #ecfeff;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 0 30px rgba(63, 255, 227, .12);
      transition: transform .18s ease, opacity .18s ease;
    }
    .primary-button:active {
      transform: scale(.98);
    }
    .primary-button:disabled {
      opacity: .40;
      box-shadow: none;
    }
    .ghost-button {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .04);
      color: #cbd5e1;
    }
    .small-pill {
      border-radius: 999px;
      border: 1px solid rgba(207, 250, 254, .15);
      background: rgba(207, 250, 254, .08);
      padding: 8px 12px;
      color: #cffafe;
      font-size: 12px;
      transition: transform .18s ease;
    }
    .small-pill:active {
      transform: scale(.96);
    }
    .onboarding-step {
      height: 100%;
      padding-top: 16px;
    }
    .onboarding-card {
      padding: 24px;
      text-align: center;
      border-radius: 34px;
      border: 1px solid rgba(167, 243, 208, .10);
      background: radial-gradient(circle at 50% 28%, rgba(123, 255, 194, .18), transparent 44%), rgba(255, 255, 255, .035);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08);
    }
    .intro-tree {
      position: relative;
      width: 240px;
      height: 320px;
      margin: 0 auto;
    }
    .intro-trunk {
      position: absolute;
      bottom: 20px;
      left: 50%;
      width: 16px;
      height: 160px;
      transform: translateX(-50%);
      border-radius: 999px 999px 0 0;
      background: #51351d;
    }
    .intro-leaf {
      position: absolute;
      border-radius: 999px;
      background: radial-gradient(circle at 38% 30%, rgba(152, 255, 197, .72), rgba(30, 86, 62, .74));
    }
    .intro-leaf.one {
      bottom: 160px;
      left: 92px;
      width: 96px;
      height: 96px;
      box-shadow: 0 0 45px rgba(97, 255, 184, .22);
    }
    .intro-leaf.two {
      bottom: 104px;
      left: 58px;
      width: 112px;
      height: 112px;
    }
    .intro-leaf.three {
      bottom: 88px;
      right: 42px;
      width: 112px;
      height: 112px;
    }
    .intro-shadow {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 176px;
      height: 20px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(167, 243, 208, .30);
      filter: blur(18px);
    }
    .onboarding-copy {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
    }
    .onboarding-form {
      padding-top: 40px;
    }
    .has-top-actions {
      padding-top: 0 !important;
    }
    .onboarding-top-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 36px;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .top-action-placeholder,
    .top-icon-button {
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
    }
    .top-action-placeholder {
      display: block;
    }
    .top-icon-button {
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid rgba(207, 250, 254, .16);
      background: rgba(255, 255, 255, .055);
      color: #e8fffb;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08), 0 8px 22px rgba(0, 0, 0, .22);
      transition: transform .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
    }
    .top-icon-button:hover {
      border-color: rgba(207, 250, 254, .28);
      background: rgba(207, 250, 254, .09);
      color: #ffffff;
    }
    .top-icon-button:active {
      transform: scale(.94);
    }
    .top-icon-button.refresh {
      background: rgba(207, 250, 254, .075);
    }
    .top-icon-button svg {
      width: 18px;
      height: 18px;
    }
    .question {
      margin: 0;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.55;
    }
    .goal-input {
      width: 100%;
      height: 160px;
      margin-top: 20px;
      resize: none;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, .08);
      outline: none;
      background: rgba(0, 0, 0, .25);
      padding: 16px;
      color: #f8fafc;
      font-size: 14px;
      line-height: 1.7;
    }
    .goal-input:focus {
      border-color: rgba(207, 250, 254, .30);
    }
    .goal-input::placeholder {
      color: #64748b;
    }
    .hint-copy {
      margin: 12px 0 0;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.7;
    }
    .loading-track {
      height: 6px;
      margin-top: 20px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .10);
    }
    .loading-bar {
      width: 66%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #70ffbe, #55ffe0, #e9d58a);
      animation: loadingBar 1.05s ease-in-out infinite;
    }
    .focus-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .focus-card {
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .06);
      background: rgba(0, 0, 0, .18);
    }
    .focus-card p {
      margin: 0;
    }
    .focus-title {
      color: #f1f5f9;
      font-size: 14px;
    }
    .focus-note {
      margin-top: 4px !important;
      color: #94a3b8;
      font-size: 12px;
    }
    .today-suggestion .card-head h3 {
      font-size: 14px;
    }
    .suggestion-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .suggestion-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border-radius: 14px;
      background: rgba(0, 0, 0, .18);
      padding: 10px;
    }
    .suggestion-item span {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 1px solid rgba(207, 250, 254, .16);
      color: #cffafe;
      font-size: 11px;
    }
    .suggestion-item p {
      margin: 0;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.55;
    }
    .onboarding-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .onboarding-actions .ghost-button {
      width: 100%;
      padding: 14px 18px;
      font-size: 14px;
    }
    .path-choice {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-top: 10px;
    }
    .path-hero {
      position: relative;
      overflow: hidden;
      padding: 20px;
      border-radius: 30px;
      border: 1px solid rgba(167, 243, 208, .13);
      background:
        radial-gradient(circle at 18% 14%, rgba(254, 240, 138, .13), transparent 30%),
        radial-gradient(circle at 84% 10%, rgba(103, 232, 249, .16), transparent 36%),
        linear-gradient(145deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .026));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .10), 0 24px 70px rgba(0, 0, 0, .26);
    }
    .path-hero::after {
      content: "";
      position: absolute;
      right: -56px;
      bottom: -68px;
      width: 178px;
      height: 178px;
      border-radius: 50%;
      border: 1px solid rgba(207, 250, 254, .10);
      background: radial-gradient(circle at 40% 40%, rgba(207, 250, 254, .13), transparent 62%);
    }
    .path-hero h3 {
      position: relative;
      margin: 8px 0 0;
      color: #fff;
      font-size: 22px;
      line-height: 1.26;
      letter-spacing: 0;
    }
    .path-hero .path-copy {
      position: relative;
      max-width: 260px;
      margin-bottom: 0;
    }
    .path-choice-card {
      overflow: hidden;
      padding: 16px;
      border-radius: 26px;
      border: 1px solid rgba(167, 243, 208, .10);
      background: rgba(255, 255, 255, .035);
    }
    .path-choice-card h3,
    .vision-ack h3,
    .planning-review h3 {
      margin: 8px 0 0;
      color: #fff;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: 0;
    }
    .path-copy {
      margin: 10px 0 18px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.75;
    }
    .path-action-stack {
      display: grid;
      gap: 10px;
    }
    .path-option-list {
      display: grid;
      gap: 10px;
    }
    .path-option {
      position: relative;
      width: 100%;
      overflow: hidden;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 96px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, .095);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .028)),
        rgba(0, 0, 0, .14);
      padding: 14px;
      text-align: left;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .07);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .path-option::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .92;
      pointer-events: none;
    }
    .path-option.deep::before {
      background: radial-gradient(circle at 100% 0%, rgba(103, 232, 249, .14), transparent 45%);
    }
    .path-option.quick::before {
      background: radial-gradient(circle at 100% 0%, rgba(167, 243, 208, .13), transparent 45%);
    }
    .path-option.manual::before {
      background: radial-gradient(circle at 100% 0%, rgba(254, 240, 138, .15), transparent 45%);
    }
    .path-option:hover {
      border-color: rgba(207, 250, 254, .22);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .09), rgba(255, 255, 255, .038)),
        rgba(0, 0, 0, .12);
    }
    .path-option:active {
      transform: scale(.985);
    }
    .path-icon {
      position: relative;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 16px;
      border: 1px solid rgba(207, 250, 254, .13);
      background: rgba(0, 0, 0, .20);
      color: #ecfeff;
      font-size: 19px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .20);
    }
    .path-body {
      position: relative;
      min-width: 0;
    }
    .path-body h4 {
      margin: 0;
      color: #f8fafc;
      font-size: 15px;
      line-height: 1.35;
    }
    .path-body p {
      margin: 5px 0 0;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.55;
    }
    .path-arrow {
      position: relative;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .09);
      color: rgba(236, 254, 255, .78);
      background: rgba(255, 255, 255, .045);
    }
    .secondary-button {
      width: 100%;
      padding: 15px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .045);
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 600;
      transition: transform .18s ease, background .18s ease;
    }
    .secondary-button:active {
      transform: scale(.98);
    }
    .onboarding-secondary-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .onboarding-secondary-actions .secondary-button {
      min-width: 0;
      padding: 13px 12px;
      font-size: 13px;
      line-height: 1.35;
      white-space: normal;
    }
    .onboarding-secondary-actions.single {
      grid-template-columns: 1fr;
    }
    .path-ribbon {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      border: 1px solid rgba(254, 240, 138, .20);
      background: rgba(254, 240, 138, .10);
      padding: 6px 10px;
      color: #fef3c7;
      font-size: 11px;
      font-weight: 700;
    }
    .manual-flow {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .manual-stepper {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 2px;
    }
    .manual-dot {
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
    }
    .manual-dot.done {
      background: rgba(167, 243, 208, .42);
    }
    .manual-dot.active {
      background: linear-gradient(90deg, #d8c36c, #73f6dc);
      box-shadow: 0 0 18px rgba(115, 246, 220, .22);
    }
    .manual-card {
      position: relative;
      overflow: hidden;
      padding: 18px;
      border-radius: 30px;
      border: 1px solid rgba(254, 240, 138, .13);
      background:
        radial-gradient(circle at 88% 0%, rgba(254, 240, 138, .12), transparent 38%),
        radial-gradient(circle at 0% 100%, rgba(103, 232, 249, .10), transparent 44%),
        rgba(255, 255, 255, .045);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .09), 0 22px 60px rgba(0, 0, 0, .25);
    }
    .manual-card::after {
      content: "";
      position: absolute;
      right: -30px;
      top: 42px;
      width: 110px;
      height: 110px;
      border-radius: 32px;
      border: 1px solid rgba(254, 240, 138, .10);
      transform: rotate(18deg);
      background: rgba(255, 255, 255, .018);
      pointer-events: none;
    }
    .manual-card h3 {
      position: relative;
      margin: 8px 0 0;
      color: #fff;
      font-size: 21px;
      line-height: 1.32;
    }
    .manual-card .hint-copy {
      position: relative;
      max-width: 260px;
    }
    .manual-input {
      position: relative;
      width: 100%;
      height: 154px;
      margin-top: 16px;
      resize: none;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, .09);
      outline: none;
      background: rgba(0, 0, 0, .24);
      padding: 15px;
      color: #f8fafc;
      font-size: 14px;
      line-height: 1.65;
      box-shadow: inset 0 1px 18px rgba(0, 0, 0, .20);
    }
    .manual-input:focus {
      border-color: rgba(254, 240, 138, .28);
    }
    .manual-context {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .manual-context-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, .07);
      background: rgba(0, 0, 0, .16);
      padding: 10px 12px;
      color: #cbd5e1;
      font-size: 12px;
    }
    .manual-context-row span:last-child {
      max-width: 160px;
      overflow: hidden;
      color: #fef3c7;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .manual-context-row.empty span:last-child {
      color: #64748b;
    }
    .manual-ai-panel {
      margin-top: 14px;
      border-radius: 20px;
      border: 1px solid rgba(103, 232, 249, .14);
      background:
        radial-gradient(circle at 100% 0%, rgba(103, 232, 249, .14), transparent 42%),
        rgba(8, 21, 22, .62);
      padding: 12px;
    }
    .manual-ai-panel p {
      margin: 0;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.65;
    }
    .manual-actions {
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(0, 1.35fr);
      gap: 10px;
      margin-top: auto;
    }
    .manual-actions .primary-button {
      padding-left: 12px;
      padding-right: 12px;
    }
    .manual-ai-button {
      width: 100%;
      border-radius: 16px;
      padding: 13px 12px;
      font-size: 13px;
      font-weight: 700;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .manual-ai-button {
      border: 1px solid rgba(103, 232, 249, .16);
      background: rgba(103, 232, 249, .08);
      color: #cffafe;
    }
    .manual-ai-button:active {
      transform: scale(.98);
    }
    .vision-ack,
    .planning-review {
      padding-top: 24px;
    }
    .ack-symbol {
      display: grid;
      place-items: center;
      width: 78px;
      height: 78px;
      margin: 0 auto 18px;
      border-radius: 999px;
      border: 1px solid rgba(167, 243, 208, .20);
      background:
        radial-gradient(circle at 36% 28%, rgba(255, 255, 255, .62), transparent 22%),
        radial-gradient(circle at 50% 50%, rgba(123, 255, 194, .26), rgba(22, 62, 48, .78));
      color: #ecfeff;
      font-size: 28px;
      box-shadow: 0 0 34px rgba(83, 255, 190, .22);
    }
    .review-list {
      max-height: 470px;
      margin-top: 14px;

    function renderManualContext() {
      const rows = [

        ["本月目标", "monthGoal"],
      ];
      return `
        <div class="manual-context">
          ${rows.map(([label, key]) => `
            <div class="manual-context-row ${manualValue(key) ? "" : "empty"}">
              <span>${label}</span>
              <span>${escapeHtml(manualDisplay(key))}</span>
            </div>
          `).join("")}
        </div>`;
    }

    function renderManualOnboarding() {
      const meta = MANUAL_STEP_META[state.onboardingStep];
      const value = state.manualPlan[meta.key] || "";
      const isFinal = state.onboardingStep === 13;
      const showContext = state.onboardingStep >= 12;
      return `
        <div class="manual-flow panel-in has-top-actions">
          ${renderOnboardingTopActions()}
          <div class="manual-stepper" aria-hidden="true">

              <span class="manual-dot ${index < manualStepIndex() ? "done" : ""} ${index === manualStepIndex() ? "active" : ""}"></span>
            `).join("")}

          <section class="manual-card">

            <p class="hint-copy">${meta.hint}</p>

            ${state.manualPlan.usedAi ? `
              <div class="manual-ai-panel">

          </div>
        </div>`;
    }

    function weekEnergy() {
      const values = state.weekRecords.map((day) => day.v).filter(Boolean);
      if (!values.length) return 0;
      return Math.round(values.reduce((sum, value) => sum + value, 0) / values.length);
    }

    function todoSummary(todos) {
      const doneCount = todos.filter((todo) => todo.done).length;
      return `${doneCount}/${todos.length}`;
    }

    function weekRecordsForView() {
      return state.weekRecords.map((day, index) => index === 6
        ? { ...day, todos: state.todos.map(({ text, done }) => ({ text, done })) }
        : day);
    }

    function syncTodayTodos() {
      state.weekRecords = state.weekRecords.map((day, index) => index === 6
        ? { ...day, todos: state.todos.map(({ text, done }) => ({ text, done })) }
        : day);
    }

    function onboardingBackStep() {
      const backSteps = { 2: 1, 4: 1, 5: 4, 6: 5, 7: 6, 8: 7, 9: 1, 10: 9, 11: 10, 12: 11, 13: 12 };
      if (state.onboardingStep === 3) return state.onboardingPath === "deep" ? 8 : 2;
      return backSteps[state.onboardingStep] ?? state.onboardingStep;
    }

    function goBackOnboarding() {
      state.onboardingLoading = false;
      state.onboardingStep = onboardingBackStep();
    }

    function nextRegenerationIndex(key, total) {
      const nextIndex = (state.regenerationCounts[key] + 1) % total;
      state.regenerationCounts = { ...state.regenerationCounts, [key]: nextIndex };
      return nextIndex;
    }

    function regenerateActionPlan() {
      const index = nextRegenerationIndex("actions", ACTION_PLAN_VARIANTS.length);
      const nextPlan = cloneActionPlanVariant(index);
      state.focusItems = nextPlan.focusItems;
      state.todos = nextPlan.todos;
      syncTodayTodos();
    }

    function regenerateCurrentOnboarding() {
      if (state.onboardingStep === 3) {
        regenerateActionPlan();
      }
      if (state.onboardingStep === 6) {
        const index = nextRegenerationIndex("annual", ANNUAL_OKR_VARIANTS.length);
        state.annualOkrs = [...ANNUAL_OKR_VARIANTS[index]];
      }
      if (state.onboardingStep === 7) {
        const index = nextRegenerationIndex("quarter", QUARTER_OKR_VARIANTS.length);
        state.quarterOkrs = QUARTER_OKR_VARIANTS[index].map((item) => ({ ...item }));
      }
      if (state.onboardingStep === 8) {
        const index = nextRegenerationIndex("commitments", WEEK_COMMITMENT_VARIANTS.length);
        state.weekCommitments = [...WEEK_COMMITMENT_VARIANTS[index]];
      }
    }

    function manualStepIndex(step = state.onboardingStep) {
      return Math.max(0, Math.min(4, step - 9));
    }

    function manualValue(key) {
      return (state.manualPlan[key] || "").trim();
    }

    function manualDisplay(key) {
      return manualValue(key) || "暂未设置";
    }

    function textToTodos(text) {
      const parts = text
        .split(/\n|；|;/)
        .map((item) => item.replace(/^\s*(\d+\.|[一二三四五六七八九十]+、|-)\s*/, "").trim())
        .filter(Boolean);
      const source = parts.length ? parts : MANUAL_AI_TODOS.map((item) => item.text);
      return source.slice(0, 5).map((item, index) => ({ id: 600 + index, text: item, done: false }));
    }

    function weekPlanToFocusItems(text) {
      const parts = text
        .split(/\n|；|;/)
        .map((item) => item.replace(/^\s*(\d+\.|[一二三四五六七八九十]+、|-)\s*/, "").trim())
        .filter(Boolean);
      const source = parts.length ? parts : [
        "本周先跑通一个可执行计划",
        "把今日清单保持在能完成的密度",
        "保留身体和阅读的最低行动线",
      ];
      return source.slice(0, 4).map((title, index) => ({
        title,
        value: [18, 8, 0, 0][index] ?? 0,
        note: index === 0 ? "手动创建，本周开始推进" : "可在计划页继续补充",
      }));
    }

    function syncManualPlanToApp() {
      const weekText = manualValue("weekPlan");
      const todayText = manualValue("todayTodoText");
      state.focusItems = weekText ? weekPlanToFocusItems(weekText) : [];
      state.todos = todayText ? textToTodos(todayText) : [];
      state.monthWeeks = state.monthWeeks.map((item) => item.week === "W16"
        ? {
            ...item,
            title: weekText ? "手动 OKR 本周推进" : "只从今日清单开始",
            state: "当前周",
            items: state.focusItems.length ? state.focusItems.map((focus) => focus.title) : ["本周计划暂未设置，可以先从今日清单开始"],
          }
        : item);
      syncTodayTodos();
    }

    function applyManualAi() {
      const meta = MANUAL_STEP_META[state.onboardingStep];
      if (!meta) return;
      const suggestionByKey = {
        yearGoal: MANUAL_AI_SUGGESTIONS.year,
        quarterGoal: MANUAL_AI_SUGGESTIONS.quarter,
        monthGoal: MANUAL_AI_SUGGESTIONS.month,
        weekPlan: MANUAL_AI_SUGGESTIONS.week,
        todayTodoText: MANUAL_AI_SUGGESTIONS.today,
      };
      state.manualPlan = {
        ...state.manualPlan,
        [meta.key]: state.manualPlan[meta.key].trim() || suggestionByKey[meta.key] || state.manualPlan[meta.key],
        usedAi: true,
      };
      if (state.onboardingStep === 12 && !manualValue("todayTodoText")) {
        state.manualPlan.todayTodoText = MANUAL_AI_SUGGESTIONS.today;
      }
      if (state.onboardingStep === 13 && !manualValue("weekPlan")) {
        state.manualPlan.weekPlan = MANUAL_AI_SUGGESTIONS.week;
      }
      state.planSource = "mixed";
      syncManualPlanToApp();
    }

    function advanceManualOnboarding() {
      const meta = MANUAL_STEP_META[state.onboardingStep];
      if (!meta) return;
      state.planSource = state.manualPlan.usedAi ? "mixed" : "manual";
      if (state.onboardingStep < 13) {
        state.onboardingStep += 1;
      } else {
        syncManualPlanToApp();
        state.booted = true;
        state.tab = "list";
        state.viewedList = true;
      }
    }


    function syncEnergyRail(value, dragging = false) {
      const rail = document.getElementById("energy-rail");
      if (!rail) return;
      const visualX = Math.min(94, Math.max(6, value));
      rail.style.setProperty("--range-fill", `${value}%`);
      rail.style.setProperty("--range-x", `${visualX}%`);
      if (dragging) {
        rail.classList.remove("is-dragging");
        void rail.offsetWidth;
        rail.classList.add("is-dragging");
      }
    }

      if (state.onboardingStep === 7) {

    function renderEnergyOrb() {

        const opacity = 0.42 - index * 0.026;
        return `<span class="orb-bubble" style="width:${size}px;height:${size}px;left:${left}px;bottom:${bottom}px;opacity:${opacity};animation-delay:${index * 90}ms"></span>`;
      }).join("");
      return `
        <div class="energy-orb ${state.charging ? "is-charging" : ""}">
          <div class="orb-aura"></div>
          <div class="orb-core"></div>
          <div class="orb-shadow"></div>

            <div class="orb-value">${weekEnergy()}<span>%</span></div>
            <div class="orb-label">本周能量</div>
            <div class="orb-status">${state.charging ? "能量注入中" : "静默充能中"}</div>
          </div>
        </div>`;
    }

    function renderNitroSparks() {
      const sparkColors = ["#fffbea", "#fff27a", "#ffb020", "#67e8f9", "#a7f3d0"];
      return Array.from({ length: 14 }, (_, index) => {
        const direction = index % 2 === 0 ? -1 : 1;
        const sparkX = -26 - (index % 5) * 13;
        const sparkY = direction * (8 + (index % 4) * 6);
        const size = 2 + (index % 4);
        const delay = (index % 7) * 38;
        const color = sparkColors[index % sparkColors.length];
        return `<span class="nitro-spark" style="--spark-x:${sparkX}px;--spark-y:${sparkY}px;--spark-size:${size}px;--spark-color:${color};animation-delay:${delay}ms"></span>`;
      }).join("");
    }

        <p class="eyebrow">NewMe Prototype</p>
        <h1>交互原型 · 精简版</h1>
        <p class="side-desc">冷启动升级为三路径：深度愿景规划、快速季度规划、手动创建 OKR。手动路径不单独放跳过按钮，空着直接下一步；也能在任意节点局部引入 AI，但不会自动补上游目标。</p>
        <div class="side-tabs">
          ${tabItems.map(([id, label]) => `<button class="side-tab ${state.booted && state.tab === id ? "active" : ""}" data-action="change-tab" data-tab="${id}" ${state.booted ? "" : "disabled"}>${label}</button>`).join("")}
        </div>
        <div class="side-notes">
          <div class="note-card"><span>能量页：</span>一屏展示：能量球、本周进度概览、能量条、确认按钮。</div>
          <div class="note-card"><span>清单页：</span>今日待办支持新增、勾选、编辑；左滑露出垃圾桶删除，右上角查看 7 天 TDL。</div>
          <div class="note-card"><span>计划页：</span>顶部切换「周/月计划」与「年/季度」，手动来源展示暂未设置和补填入口。</div>
          <div class="note-card"><span>成长树：</span>果实时间胶囊展示本周重点、结果和感悟；周结算可微调结果。</div>
          <div class="note-card"><span>冷启动：</span>三张路径卡片并列，手动 OKR 不是降级入口，而是普通工具链路。</div>
        </div>
        <div class="side-footer">
          <button data-action="reset">重置原型</button>
          ${!state.booted ? '<button class="skip-button" data-action="skip-onboarding">跳过冷启动</button>' : ""}
        </div>`;
    }

    function renderApp() {
      const screen = !state.booted
        ? renderPhone(renderOnboarding(), { tab: "tree", showNav: false })
        : state.tab === "energy"
          ? renderEnergyScreen()
          : state.tab === "list"
            ? renderListScreen()
            : state.tab === "plan"
              ? renderPlanScreen()
              : state.tab === "tree"
                ? renderTreeScreen()
                : renderSettlementScreen();
      document.getElementById("phoneHost").innerHTML = screen + renderOverlays();
      document.getElementById("sidePanel").innerHTML = renderSidePanel();
      const draft = document.getElementById("draft-input");
      if (draft) draft.focus();
      const editInput = document.getElementById("edit-input");
      if (editInput) editInput.focus();
      const visionInput = document.getElementById("vision-input");
      if (visionInput) visionInput.focus();
      const manualInput = document.querySelector(".manual-input");
      if (manualInput) manualInput.focus();
    }

    function changeTab(tab) {
      if (tab === "list") state.viewedList = true;
      if (tab === "settlement") state.settlementConfirmed = false;
      if (tab !== "list") state.selectedWeek = null;
      state.tab = tab;
      state.showReminder = false;
      state.showWeek = false;
      state.selectedFruit = null;
      renderApp();
    }

    function doConfirmEnergy() {
      state.charging = true;
      state.weekRecords = state.weekRecords.map((day, index) => index === 6
        ? { ...day, v: state.energyValue, todos: state.todos.map(({ text, done }) => ({ text, done })) }
        : day);
      state.toast = true;
      renderApp();
      window.setTimeout(() => {
        state.charging = false;
        renderApp();
      }, 1300);
      window.setTimeout(() => {
        state.toast = false;
        renderApp();
      }, 1400);
    }

    function resetPrototype() {
      state.booted = false;
      state.tab = "energy";
      state.onboardingStep = 0;
      state.onboardingPath = null;
      state.onboardingLoading = false;
      state.regenerationCounts = cloneRegenerationCounts();
      state.vision = DEFAULT_VISION;
      state.annualOkrs = cloneAnnualOkrs();
      state.quarterOkrs = cloneQuarterOkrs();
      state.weekCommitments = cloneWeekCommitments();
      state.manualPlan = cloneManualPlan();
      state.planSource = "ai";
      state.todos = cloneTodos();
      state.monthWeeks = cloneMonth();
      state.weekRecords = cloneWeek();
      state.fruits = cloneFruits();
      state.energyValue = 62;
      state.charging = false;
      state.viewedList = false;
      state.showReminder = false;
      state.showWeek = false;
      state.selectedFruit = null;
      state.selectedWeek = null;
      state.swipedTodoId = null;
      state.adding = false;
      state.draft = "";
      state.editingTodoId = null;
      state.editDraft = "";
      state.planView = "month";
      state.planning = false;
      state.planCoachOpen = false;
      state.planFeedback = "";
      state.planRounds = 0;
      state.treeDetail = null;
      state.settlementConfirmed = false;
      state.settlementScore = null;
      state.settlementReflection = "这一周虽然有几次节奏被打断，但关键推进没有断线。";
      state.toast = false;
      renderApp();
    }

    document.addEventListener("click", (event) => {
      if (suppressNextClick) {
        suppressNextClick = false;
        if (!event.target.closest("[data-action]")) {
          event.preventDefault();
          return;
        }
      }
      if (event.target.classList.contains("modal-layer")) {
        const modal = event.target.dataset.modal;
        if (modal === "reminder") state.showReminder = false;
        if (modal === "week") state.showWeek = false;
        if (modal === "fruit") state.selectedFruit = null;
        if (modal === "edit") {
          state.editingTodoId = null;
          state.editDraft = "";
        }
        renderApp();
        return;
      }
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;
      if (action === "onboarding-back") {
        goBackOnboarding();
      }
      if (action === "regenerate-current-onboarding") {
        regenerateCurrentOnboarding();
      }
      if (action === "onboard-next") {
        state.onboardingStep = 1;
      }
      if (action === "choose-deep-planning") {
        state.onboardingPath = "deep";
        state.onboardingStep = 4;
      }
      if (action === "choose-quick-planning") {
        state.onboardingPath = "quick";
        state.onboardingStep = 2;
      }
      if (action === "choose-manual-planning") {
        state.onboardingPath = "manual";
        state.planSource = "manual";
        state.manualPlan = cloneManualPlan();
        state.onboardingStep = 9;
      }
      if (action === "manual-ai") {
        applyManualAi();
      }
      if (action === "manual-next") {
        advanceManualOnboarding();
      }
      if (action === "submit-vision") {
        if (!state.vision.trim()) return;
        state.onboardingStep = 5;
      }
      if (action === "build-annual-okr") {
        state.onboardingStep = 6;
      }
      if (action === "confirm-annual-okrs") {
        state.onboardingStep = 7;
      }
      if (action === "confirm-quarter-okrs") {
        state.onboardingStep = 8;
      }
      if (action === "confirm-week-commitments") {
        state.onboardingStep = 3;
      }
      if (action === "start-ai") {
        if (!state.goal.trim() || state.onboardingLoading) return;
        state.onboardingLoading = true;
        renderApp();
        window.setTimeout(() => {
          state.onboardingLoading = false;
          state.onboardingStep = 3;
          renderApp();
        }, 1000);
        return;
      }
      if (action === "finish-onboarding" || action === "skip-onboarding") {
        state.booted = true;
        state.tab = "energy";
      }
      if (action === "finish-onboarding-list") {
        state.booted = true;
        state.tab = "list";
        state.viewedList = true;
      }
      if (action === "change-tab") {
        if (!state.booted) return;
        changeTab(target.dataset.tab);
        return;
      }
      if (action === "confirm-energy") {
        if (!state.viewedList) {
          state.showReminder = true;
        } else {
          doConfirmEnergy();
          return;
        }
      }
      if (action === "reminder-list") {
        state.showReminder = false;
        changeTab("list");
        return;
      }
      if (action === "reminder-continue") {
        state.showReminder = false;
        doConfirmEnergy();
        return;
      }
      if (action === "toggle-todo") {
        const id = Number(target.dataset.id);
        if (state.swipedTodoId && state.swipedTodoId !== id) state.swipedTodoId = null;
        state.todos = state.todos.map((todo) => todo.id === id ? { ...todo, done: !todo.done } : todo);
        syncTodayTodos();
      }
      if (action === "edit-todo") {
        const id = Number(target.dataset.id);
        const todo = state.todos.find((item) => item.id === id);
        if (todo) {
          state.swipedTodoId = null;
          state.editingTodoId = id;
          state.editDraft = todo.text;
        }
      }
      if (action === "cancel-edit") {
        state.editingTodoId = null;
        state.editDraft = "";
      }
      if (action === "save-edit") {
        const value = state.editDraft.trim();
        if (value && state.editingTodoId !== null) {
          state.todos = state.todos.map((todo) => todo.id === state.editingTodoId ? { ...todo, text: value } : todo);
          syncTodayTodos();
        }
        state.editingTodoId = null;
        state.editDraft = "";
      }
      if (action === "delete-todo") {
        const id = Number(target.dataset.id);
        state.todos = state.todos.filter((todo) => todo.id !== id);
        state.swipedTodoId = null;
        if (state.editingTodoId === id) {
          state.editingTodoId = null;
          state.editDraft = "";
        }
        syncTodayTodos();
      }
      if (action === "open-add") {
        state.adding = true;
        state.draft = "";
      }
      if (action === "cancel-add") {
        state.adding = false;
        state.draft = "";
      }
      if (action === "add-todo") {
        const value = state.draft.trim();
        if (value) {
          state.todos = [...state.todos, { id: Date.now(), text: value, done: false }];
          state.draft = "";
          state.adding = false;
          syncTodayTodos();
        }
      }
      if (action === "open-week") {
        state.showWeek = true;
      }
      if (action === "close-week") {
        state.showWeek = false;
      }
      if (action === "plan-view") {
        state.planView = target.dataset.view;
      }
      if (action === "replan") {
        state.planCoachOpen = true;
        state.planFeedback = state.planFeedback || "这周工作会比较忙，保留晨跑，阅读任务拆小一点。";
      }
      if (action === "edit-manual-layer") {
        const stepByKey = { yearGoal: 9, quarterGoal: 10, monthGoal: 11, weekPlan: 12, todayTodoText: 13 };
        state.booted = false;
        state.onboardingPath = "manual";
        state.planSource = state.planSource === "ai" ? "manual" : state.planSource;
        state.onboardingStep = stepByKey[target.dataset.step] || 12;
      }
      if (action === "manual-plan-ai") {
        state.manualPlan = {
          ...state.manualPlan,
          weekPlan: manualValue("weekPlan") || MANUAL_AI_SUGGESTIONS.week,
          todayTodoText: manualValue("todayTodoText") || MANUAL_AI_SUGGESTIONS.today,
          usedAi: true,
        };
        state.planSource = "mixed";
        syncManualPlanToApp();
      }
      if (action === "close-plan-coach") {
        state.planCoachOpen = false;
        state.planFeedback = "";
      }
      if (action === "submit-plan-feedback") {
        if (state.planRounds >= 3) return;
        state.planning = true;
        renderApp();
        window.setTimeout(() => {
          state.monthWeeks = state.monthWeeks.map((item) => item.week === "W17"
            ? { ...item, title: "根据反馈重排 AI 任务", items: ["把任务密度从 4 件降到 3 件，先保证能完成", "保留晨跑作为稳定能量来源，不再新增运动任务", "阅读任务改成每天 15 分钟，优先完成第 2 章"] }
            : item);
          state.planRounds += 1;
          state.planning = false;
          state.planCoachOpen = false;
          renderApp();
        }, 1000);
        return;
      }
      if (action === "select-week") {
        state.selectedWeek = target.dataset.week;
        state.viewedList = true;
        state.tab = "list";
        state.showWeek = true;
        renderApp();
        return;
      }
      if (action === "tree-detail") {
        state.treeDetail = target.dataset.type;
      }
      if (action === "tree-back") {
        state.treeDetail = null;
      }
      if (action === "open-fruit") {
        state.selectedFruit = state.fruits[Number(target.dataset.index)];
      }
      if (action === "close-fruit") {
        state.selectedFruit = null;
      }
      if (action === "settle-confirm") {
        const score = state.settlementScore ?? weekEnergy();
        const nextIndex = state.fruits.length;
        const latestFruit = {
          week: "第 17 周",
          date: "2026-04-26",
          score,
          x: 205 + (nextIndex % 3) * 28,
          y: 108 + (nextIndex % 2) * 44,
          s: 18 + Math.round(score / 18),
          focuses: state.focusItems.map((item) => item.title),
          reflection: state.settlementReflection.trim() || "这一周的努力已经被树记住了。",
          note: state.settlementReflection.trim() || "这一周的努力已经被树记住了。",
        };
        state.settlementConfirmed = true;
        renderApp();
        window.setTimeout(() => {
          state.fruits = [...state.fruits, latestFruit];
          state.tab = "tree";
          state.settlementConfirmed = false;
          state.settlementScore = null;
          renderApp();
        }, 900);
        return;
      }
      if (action === "reset") {
        resetPrototype();
        return;
      }
      renderApp();
    });

    document.addEventListener("input", (event) => {
      if (event.target.id === "goal-input") {
        state.goal = event.target.value;
        const button = document.querySelector('[data-action="start-ai"]');
        if (button) button.disabled = !state.goal.trim() || state.onboardingLoading;
      }
      if (event.target.id === "vision-input") {
        state.vision = event.target.value;
        const button = document.querySelector('[data-action="submit-vision"]');
        if (button) button.disabled = !state.vision.trim();
      }
      if (event.target.id?.startsWith("annual-okr-")) {
        const index = Number(event.target.id.replace("annual-okr-", ""));
        state.annualOkrs = state.annualOkrs.map((item, itemIndex) => itemIndex === index ? event.target.value : item);
      }
      if (event.target.id?.startsWith("quarter-okr-")) {
        const index = Number(event.target.id.replace("quarter-okr-", ""));
        state.quarterOkrs = state.quarterOkrs.map((item, itemIndex) => itemIndex === index ? { ...item, text: event.target.value } : item);
      }
      if (event.target.id?.startsWith("commitment-")) {
        const index = Number(event.target.id.replace("commitment-", ""));
        state.weekCommitments = state.weekCommitments.map((item, itemIndex) => itemIndex === index ? event.target.value : item);
      }
      if (event.target.id?.startsWith("manual-")) {
        const key = event.target.id.replace("manual-", "");
        state.manualPlan = { ...state.manualPlan, [key]: event.target.value };
      }
      if (event.target.id === "draft-input") {
        state.draft = event.target.value;
      }
      if (event.target.id === "edit-input") {
        state.editDraft = event.target.value;
      }
      if (event.target.id === "energy-range") {
        state.energyValue = Number(event.target.value);
        syncEnergyRail(state.energyValue, true);
        const label = document.getElementById("energy-value-label");
        if (label) label.textContent = `${state.energyValue}%`;
      }
      if (event.target.id === "plan-feedback") {
        state.planFeedback = event.target.value;
      }
      if (event.target.id === "settlement-score") {
        state.settlementScore = Number(event.target.value);
        const label = document.getElementById("settlement-score-label");
        if (label) label.textContent = `${state.settlementScore}%`;
      }
      if (event.target.id === "settlement-reflection") {
        state.settlementReflection = event.target.value;
      }
    });

    document.addEventListener("pointerdown", (event) => {
      if (event.target.id === "energy-range") {
        syncEnergyRail(Number(event.target.value), true);
      }
      const surface = event.target.closest(".todo-surface");
      if (surface && state.tab === "list") {
        const item = surface.closest(".todo-item");
        if (item) item.classList.add("is-swiping");
        swipeGesture = {
          id: Number(surface.dataset.id),
          startX: event.clientX,
          currentX: event.clientX,
          surface,
          item,
        };
      }
    });

    document.addEventListener("pointermove", (event) => {
      if (!swipeGesture) return;
      swipeGesture.currentX = event.clientX;
      const dx = Math.min(0, Math.max(-86, event.clientX - swipeGesture.startX));
      if (Math.abs(dx) > 6) {
        swipeGesture.surface.style.setProperty("--swipe-x", `${dx}px`);
      }
    });

    document.addEventListener("pointerup", (event) => {
      if (event.target.id === "energy-range") {
        const rail = document.getElementById("energy-rail");
        if (rail) {
          window.setTimeout(() => rail.classList.remove("is-dragging"), 420);
        }
      }
      if (swipeGesture) {
        const dx = swipeGesture.currentX - swipeGesture.startX;
        if (swipeGesture.item) swipeGesture.item.classList.remove("is-swiping");
        if (dx < -42) {
          state.swipedTodoId = swipeGesture.id;
          suppressNextClick = true;
        } else if (dx > 24 || Math.abs(dx) > 6) {
          state.swipedTodoId = null;
          suppressNextClick = Math.abs(dx) > 6;
        }
        swipeGesture = null;
        if (Math.abs(dx) > 6) renderApp();
      }
    });

    document.addEventListener("pointercancel", () => {
      if (!swipeGesture) return;
      if (swipeGesture.item) swipeGesture.item.classList.remove("is-swiping");
      swipeGesture = null;
      renderApp();
    });

    document.addEventListener("keydown", (event) => {
      if (event.target.id === "draft-input" && event.key === "Enter") {
        event.preventDefault();
        const value = state.draft.trim();
        if (!value) return;
        state.todos = [...state.todos, { id: Date.now(), text: value, done: false }];
        state.draft = "";
        state.adding = false;
        syncTodayTodos();
        renderApp();
      }
      if (event.target.id === "edit-input" && event.key === "Enter") {
        event.preventDefault();
        const value = state.editDraft.trim();
        if (!value || state.editingTodoId === null) return;
        state.todos = state.todos.map((todo) => todo.id === state.editingTodoId ? { ...todo, text: value } : todo);
        state.editingTodoId = null;
        state.editDraft = "";
        syncTodayTodos();
        renderApp();
      }
    });

    function applyPrototypeDemoRoute() {
      const demo = new URLSearchParams(window.location.search).get("demo");
      if (!demo) return;
      if (demo === "path") {
        state.onboardingStep = 1;
      }
      if (demo === "manual-year") {
        state.onboardingPath = "manual";
        state.planSource = "manual";
        state.onboardingStep = 9;
      }
      if (demo === "manual-week-empty") {
        state.onboardingPath = "manual";
        state.planSource = "manual";
        state.onboardingStep = 12;
      }
      if (demo === "manual-week-ai") {
        state.onboardingPath = "manual";
        state.onboardingStep = 12;
        applyManualAi();
      }
      if (demo === "manual-plan") {
        state.booted = true;
        state.tab = "plan";
        state.planSource = "mixed";
        state.manualPlan = {
          ...cloneManualPlan(),
          weekPlan: MANUAL_AI_SUGGESTIONS.week,
          todayTodoText: MANUAL_AI_SUGGESTIONS.today,
          usedAi: true,
        };
        syncManualPlanToApp();
      }
    }

    applyPrototypeDemoRoute();
    renderApp();
  </script>
</body>
</html>
