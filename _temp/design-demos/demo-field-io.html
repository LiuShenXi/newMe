<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>能量页 - 成长树</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'sys';
    src: local('PingFang SC'), local('Microsoft YaHei'), local('sans-serif');
  }

  body {
    background: #020a04;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #c8e6c0;
  }

  .phone {
    width: 390px;
    min-height: 844px;
    background: #050f08;
    position: relative;
    overflow: hidden;
  }

  /* ===== 背景萤火虫 ===== */
  .firefly {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes firefly-blink {
    0%, 100% { opacity: 0.05; }
    50% { opacity: 0.35; }
  }
  @keyframes firefly-blink2 {
    0%, 100% { opacity: 0.02; }
    40% { opacity: 0.25; }
    70% { opacity: 0.1; }
  }
  @keyframes firefly-drift {
    0% { transform: translate(0, 0); }
    25% { transform: translate(3px, -5px); }
    50% { transform: translate(-2px, -8px); }
    75% { transform: translate(4px, -3px); }
    100% { transform: translate(0, 0); }
  }

  /* ===== 能量球区域 ===== */
  .energy-section {
    position: relative;
    z-index: 1;
    padding-top: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .energy-title {
    font-size: 14px;
    color: #5a8a5e;
    letter-spacing: 4px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .energy-orb-container {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .energy-orb-glow {
    position: absolute;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34,180,80,0.12) 0%, rgba(34,180,80,0.03) 50%, transparent 70%);
    animation: orb-breathe 4s ease-in-out infinite;
  }

  @keyframes orb-breathe {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.08); opacity: 1; }
  }

  .orb-particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #4ade80, #166534);
    box-shadow: 0 0 4px #4ade80, 0 0 8px rgba(74,222,128,0.3);
  }

  @keyframes orb-drift-1 {
    0% { transform: translate(0,0); opacity: 0.6; }
    25% { transform: translate(8px,-12px); opacity: 1; }
    50% { transform: translate(-5px,-18px); opacity: 0.7; }
    75% { transform: translate(10px,-6px); opacity: 0.9; }
    100% { transform: translate(0,0); opacity: 0.6; }
  }
  @keyframes orb-drift-2 {
    0% { transform: translate(0,0); opacity: 0.7; }
    30% { transform: translate(-10px,8px); opacity: 0.5; }
    60% { transform: translate(6px,14px); opacity: 1; }
    100% { transform: translate(0,0); opacity: 0.7; }
  }
  @keyframes orb-drift-3 {
    0% { transform: translate(0,0); opacity: 0.5; }
    20% { transform: translate(12px,5px); opacity: 0.9; }
    50% { transform: translate(-8px,-10px); opacity: 0.6; }
    80% { transform: translate(5px,12px); opacity: 1; }
    100% { transform: translate(0,0); opacity: 0.5; }
  }
  @keyframes orb-drift-4 {
    0% { transform: translate(0,0); opacity: 0.8; }
    35% { transform: translate(-6px,-14px); opacity: 0.5; }
    65% { transform: translate(10px,4px); opacity: 0.9; }
    100% { transform: translate(0,0); opacity: 0.8; }
  }
  @keyframes orb-drift-5 {
    0% { transform: translate(0,0); opacity: 0.6; }
    40% { transform: translate(7px,10px); opacity: 1; }
    70% { transform: translate(-12px,-5px); opacity: 0.4; }
    100% { transform: translate(0,0); opacity: 0.6; }
  }

  .energy-percent {
    position: relative;
    z-index: 2;
    font-size: 42px;
    font-weight: 200;
    color: #a7f3d0;
    text-shadow: 0 0 20px rgba(74,222,128,0.4), 0 0 40px rgba(74,222,128,0.15);
    letter-spacing: -1px;
  }
  .energy-percent-sign {
    font-size: 20px;
    font-weight: 300;
    color: #6ee7a0;
    margin-left: 2px;
  }
  .energy-label {
    font-size: 12px;
    color: #3d6b42;
    margin-top: 16px;
    letter-spacing: 2px;
  }

  /* ===== 承诺区域 ===== */
  .commitments-section {
    position: relative;
    z-index: 1;
    padding: 36px 28px 0;
  }

  .section-title {
    font-size: 13px;
    color: #4a7a50;
    letter-spacing: 3px;
    margin-bottom: 20px;
  }

  .commitment-item {
    margin-bottom: 22px;
  }

  .commitment-text {
    font-size: 13px;
    color: #8fbf93;
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .progress-track {
    display: flex;
    gap: 4px;
    align-items: center;
    height: 8px;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    transition: all 0.3s;
  }
  .progress-dot.lit {
    background: #4ade80;
    box-shadow: 0 0 4px #4ade80, 0 0 8px rgba(74,222,128,0.3);
    animation: dot-glow 3s ease-in-out infinite;
  }
  .progress-dot.dim {
    background: #1a3a1e;
    box-shadow: 0 0 2px rgba(74,222,128,0.05);
  }

  @keyframes dot-glow {
    0%, 100% { opacity: 0.7; box-shadow: 0 0 4px #4ade80; }
    50% { opacity: 1; box-shadow: 0 0 6px #4ade80, 0 0 12px rgba(74,222,128,0.4); }
  }

  /* ===== 今日推进度 ===== */
  .daily-section {
    position: relative;
    z-index: 1;
    padding: 32px 28px 0;
  }

  .daily-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .daily-title {
    font-size: 13px;
    color: #4a7a50;
    letter-spacing: 3px;
  }

  .daily-value {
    font-size: 22px;
    font-weight: 300;
    color: #a7f3d0;
    text-shadow: 0 0 10px rgba(74,222,128,0.3);
  }

  .slider-container {
    position: relative;
    height: 32px;
    display: flex;
    align-items: center;
  }

  .slider-track {
    width: 100%;
    height: 3px;
    background: #0f2614;
    border-radius: 2px;
    position: relative;
    overflow: visible;
  }

  .slider-fill {
    height: 100%;
    width: 60%;
    background: linear-gradient(90deg, #166534, #4ade80);
    border-radius: 2px;
    position: relative;
    box-shadow: 0 0 8px rgba(74,222,128,0.3);
  }

  .slider-thumb {
    position: absolute;
    right: -8px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle, #a7f3d0, #4ade80);
    box-shadow: 0 0 10px #4ade80, 0 0 20px rgba(74,222,128,0.3);
    animation: thumb-pulse 2.5s ease-in-out infinite;
  }

  @keyframes thumb-pulse {
    0%, 100% { box-shadow: 0 0 10px #4ade80, 0 0 20px rgba(74,222,128,0.3); }
    50% { box-shadow: 0 0 14px #4ade80, 0 0 28px rgba(74,222,128,0.5); }
  }

  /* 滑条粒子流 */
  .slider-particle {
    position: absolute;
    border-radius: 50%;
    background: #4ade80;
    top: 50%;
    pointer-events: none;
  }

  @keyframes slider-flow {
    0% { transform: translateX(0) translateY(-50%); opacity: 0; }
    20% { opacity: 0.6; }
    80% { opacity: 0.4; }
    100% { transform: translateX(60px) translateY(-50%); opacity: 0; }
  }

  .slider-marks {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    padding: 0 2px;
  }
  .slider-mark {
    font-size: 10px;
    color: #2a4a2e;
  }

  /* ===== SVG 藤蔓 ===== */
  .vine-decoration {
    position: absolute;
    bottom: 70px;
    left: 0;
    right: 0;
    height: 120px;
    z-index: 0;
    pointer-events: none;
    opacity: 0.25;
  }

  /* ===== Tab 导航 ===== */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: linear-gradient(180deg, rgba(5,15,8,0) 0%, rgba(5,15,8,0.95) 30%, #050f08 100%);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 20px;
    padding-bottom: 10px;
    z-index: 10;
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }

  .tab-icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tab-label {
    font-size: 10px;
    color: #2a4a2e;
    letter-spacing: 1px;
  }

  .tab-item.active .tab-label {
    color: #4ade80;
    text-shadow: 0 0 8px rgba(74,222,128,0.4);
  }

  .tab-item.active .tab-icon svg path,
  .tab-item.active .tab-icon svg circle,
  .tab-item.active .tab-icon svg line,
  .tab-item.active .tab-icon svg polyline,
  .tab-item.active .tab-icon svg rect {
    stroke: #4ade80;
    filter: drop-shadow(0 0 4px rgba(74,222,128,0.5));
  }

  .tab-icon svg {
    width: 20px;
    height: 20px;
  }
  .tab-icon svg path,
  .tab-icon svg circle,
  .tab-icon svg line,
  .tab-icon svg polyline,
  .tab-icon svg rect {
    stroke: #2a4a2e;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
