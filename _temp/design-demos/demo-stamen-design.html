<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>能量页 - 成长树</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060d08;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  }
  .phone {
    width: 390px; min-height: 844px; background: #0b1a0f; position: relative;
    overflow: hidden; color: #c8d8c0;
  }
  /* 地形纹理背景 */
  .phone::before {
    content: ''; position: absolute; inset: 0; opacity: 0.07; z-index: 0;
    background:
      repeating-conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(120,160,100,0.15) 2deg, transparent 4deg),
      radial-gradient(ellipse at 30% 20%, rgba(80,120,60,0.1) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(60,100,50,0.08) 0%, transparent 50%);
  }
  .phone::after {
    content: ''; position: absolute; inset: 0; z-index: 0; opacity: 0.04;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(100,140,80,0.3) 40px, rgba(100,140,80,0.3) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(100,140,80,0.2) 40px, rgba(100,140,80,0.2) 41px);
  }
  .content { position: relative; z-index: 1; padding: 50px 24px 100px; }

  /* 页面标题 */
  .page-title {
    text-align: center; font-size: 13px; letter-spacing: 4px; color: #6b8a5e;
    margin-bottom: 28px; font-weight: 300; text-transform: uppercase;
  }
  .page-title span { border-bottom: 1px solid rgba(107,138,94,0.3); padding-bottom: 4px; }

  /* 能量球区域 */
  .energy-orb { display: flex; justify-content: center; margin-bottom: 36px; position: relative; }
  .energy-orb svg { filter: drop-shadow(0 0 30px rgba(80,130,60,0.15)); }
  @keyframes rotateRing { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulseGlow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  .ring-outer { animation: rotateRing 20s linear infinite; transform-origin: center; }
  .ring-mid { animation: rotateRing 35s linear infinite reverse; transform-origin: center; }
  .energy-label {
    font-size: 11px; color: #6b8a5e; text-align: center; margin-top: -8px;
    margin-bottom: 32px; letter-spacing: 2px;
  }

  /* 承诺区域 */
  .section-title {
    font-size: 11px; color: #5a7a4e; letter-spacing: 3px; margin-bottom: 16px;
    font-weight: 400; text-transform: uppercase;
  }
  .commitments { margin-bottom: 36px; }
  .commit-item { margin-bottom: 20px; }
  .commit-text { font-size: 14px; color: #a8c4a0; margin-bottom: 8px; line-height: 1.5; }
  .commit-percent { font-size: 12px; color: #6b8a5e; float: right; }

  /* 等高线进度条 */
  .contour-bar { position: relative; height: 18px; margin-top: 4px; }
  .contour-bar svg { width: 100%; height: 18px; }

  /* 今日推进度 */
  .daily-section { margin-bottom: 20px; }
  .daily-title { font-size: 11px; color: #5a7a4e; letter-spacing: 3px; margin-bottom: 14px; }
  .daily-value { font-size: 13px; color: #a8c4a0; text-align: right; margin-bottom: 6px; }
  .vine-slider { position: relative; height: 40px; }
  .vine-slider svg { width: 100%; height: 40px; }

  /* 底部导航 */
  .tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 84px;
    background: linear-gradient(to top, #0a1610 60%, rgba(10,22,16,0.95));
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 12px; z-index: 10;
    border-top: 1px solid rgba(80,120,60,0.15);
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 10px; color: #4a6a40; letter-spacing: 1px; cursor: pointer;
    transition: color 0.3s;
  }
  .tab-item.active { color: #8ab878; }
  .tab-item svg { width: 22px; height: 22px; }
  .tab-item.active svg { filter: drop-shadow(0 0 6px rgba(138,184,120,0.4)); }

  /* 装饰植物 */
  .deco-plant { position: absolute; opacity: 0.08; z-index: 0; }
  .deco-plant.top-right { top: 30px; right: -10px; }
  .deco-plant.bottom-left { bottom: 120px; left: -15px; transform: scaleX(-1); }
</style>
</head>
<body>

    <!-- 页面标题 -->

    <!-- 能量球 - 年轮同心圆 -->
    <div class="energy-orb">

            <feGaussianBlur stdDeviation="2" result="blur"/>

        <!-- 最外层光晕 -->

          <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4.5s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
    <div class="energy-label">周能量指数</div>

    <!-- 本周承诺 -->

      <!-- 承诺1 -->
