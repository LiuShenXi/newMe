services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      AI_FALLBACK_API_KEY: ${AI_FALLBACK_API_KEY:-}
      AI_FALLBACK_BASE_URL: ${AI_FALLBACK_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-glm-4-flash}
      AI_LOCAL_API_KEY: ${AI_LOCAL_API_KEY:-local-dev-key}
      AI_LOCAL_BASE_URL: ${AI_LOCAL_BASE_URL:-http://host.docker.internal:4100/v1}
      AI_LOCAL_MODEL: ${AI_LOCAL_MODEL:-local-qwen-coder}
      DATABASE_URL: postgresql://newme:newme@postgres:5432/newme_dev
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-30d}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: newme_dev
      POSTGRES_PASSWORD: newme
      POSTGRES_USER: newme
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newme -d newme_dev"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "${NGINX_PORT:-37200}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
